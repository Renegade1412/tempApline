name: Fetch Alpine Dependencies

# 定义工作流的触发方式：允许手动触发
on:
  workflow_dispatch:

jobs:
  fetch-deps:
    # 使用 Ubuntu 最新版的 Runner，它预装了 Docker
    runs-on: ubuntu-latest
    steps:
      # 第一步：检出仓库代码（虽然我们不需要代码，但这是一个好习惯）
      - name: Checkout repository
        uses: actions/checkout@v4

      # 第二步：运行你的 Docker 命令来下载依赖包
      - name: Run apk fetch in Docker container
        # 这里使用一个专门用于运行 Docker 命令的 Action [citation:7]
        uses: addnab/docker-run-action@v3
        with:
          # 使用你需要的 Alpine 镜像
          image: alpine:3.20
          # 配置卷挂载，将 Runner 上的当前目录挂载到容器的 /deps，以便获取下载的文件 [citation:3][citation:7]
          options: -v ${{ github.workspace }}:/deps
          # 要执行的命令：更新索引并下载所有依赖包
          run: |
            apk update
            apk fetch --recursive --no-cache -o /deps \
              gcc make musl-dev libffi-dev openssl-dev zlib-dev \
              bzip2-dev readline-dev sqlite-dev xz-dev tk-dev linux-headers

      # 第三步：将下载的所有 .apk 文件打包成一个压缩包，方便下载
      - name: Package dependencies
        run: |
          # 在 Runner 的工作目录中创建一个 'output' 文件夹
          mkdir -p output
          # 将所有 .apk 文件移动到 output 文件夹并打包
          mv *.apk output/ 2>/dev/null || true
          tar -czf alpine-deps.tar.gz output/

      # 第四步：将打包好的文件作为 GitHub Actions 的工件（Artifact）上传，供你下载 [citation:2]
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: alpine-dependencies
          path: alpine-deps.tar.gz