name: Build Python 3.14 (musl) + numpy/pandas wheels

on:
  workflow_dispatch:

jobs:
  build-python:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Python 3.14.3 in Alpine (musl)
        uses: addnab/docker-run-action@v3
        with:
          image: alpine:3.20
          options: -v ${{ github.workspace }}:/work
          run: |
            set -eux

            apk add --no-cache \
              build-base \
              openssl-dev \
              bzip2-dev \
              xz-dev \
              readline-dev \
              sqlite-dev \
              libffi-dev \
              zlib-dev \
              tk-dev \
              linux-headers \
              curl

            cd /work
            curl -LO https://www.python.org/ftp/python/3.14.3/Python-3.14.3.tar.xz
            tar -xJf Python-3.14.3.tar.xz
            cd Python-3.14.3

            ./configure \
              --prefix=/opt/python-3.14.3 \
              --with-ensurepip=install \
              --enable-shared \
              --disable-test-modules

            make -j$(nproc)
            make install

            tar -czf /work/python-3.14.3-musl.tar.gz -C /opt python-3.14.3

      - name: Upload Python artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-3.14.3-musl
          path: python-3.14.3-musl.tar.gz

  build-wheels:
    needs: build-python
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Python 3.14 artifact
        uses: actions/download-artifact@v4
        with:
          name: python-3.14.3-musl
          path: python

      - name: Build numpy & pandas wheels (cp314, musllinux)
        uses: addnab/docker-run-action@v3
        with:
          image: alpine:3.20
          options: -v ${{ github.workspace }}:/work
          run: |
            set -eux

            apk add --no-cache \
              build-base \
              musl-dev \
              linux-headers \
              gfortran \
              openblas-dev \
              lapack-dev \
              python3 \
              python3-dev \
              py3-pip

            cd /work
            tar -xzf python/python-3.14.3-musl.tar.gz -C /opt
            export PATH=/opt/python-3.14.3/bin:$PATH

            python3 -m pip install -U pip setuptools wheel

            mkdir -p wheelhouse
            python3 -m pip wheel \
              --no-deps \
              --no-binary=:all: \
              numpy==1.26.4 \
              pandas==2.2.1 \
              -w wheelhouse

      - name: Upload numpy/pandas wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: numpy-pandas-cp314-musllinux
          path: wheelhouse/*.whl
